<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Marwa ❤️</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  text-align: center;
  background: linear-gradient(to bottom, #ff9a9e, #fad0c4);
  color: white;
  overflow: hidden;
}

h1 { margin-top: 20px; }

/* cake */
.cake {
  font-size: 80px;
  animation: bounce 1s infinite alternate;
}

@keyframes bounce {
  from { transform: translateY(0); }
  to { transform: translateY(-12px); }
}

/* candles */
.candles {
  font-size: 18px;
  margin-top: -15px;
  letter-spacing: 3px;
}

/* content */
#box {
  max-width: 420px;
  margin: 20px auto;
  font-size: 20px;
  min-height: 120px;
}

img {
  width: 250px;
  border-radius: 15px;
  margin-top: 15px;
}

button {
  padding: 10px 20px;
  font-size: 18px;
  border: none;
  border-radius: 20px;
  background: white;
  color: #ff4d6d;
  cursor: pointer;
  margin-top: 20px;
  display: inline-block;
}

/* hearts */
.heart {
  position: absolute;
  color: red;
  animation: float 5s linear infinite;
}

@keyframes float {
  from { transform: translateY(100vh); opacity: 1; }
  to { transform: translateY(-10vh); opacity: 0; }
}
</style>
</head>

<body>

<h1>Happy Birthday Marwa ❤️</h1>

<div class="cake">🎂</div>

<div id="candles" class="candles">
🕯️🕯️🕯️🕯️🕯️ 🕯️🕯️🕯️🕯️🕯️ 🕯️🕯️🕯️🕯️🕯️ 🕯️🕯️🕯️🕯️🕯️ 🕯️
</div>

<div id="box"></div>
<img id="image" style="display:none;">
<br>
<button id="nextBtn" onclick="nextText()">Start ❤️</button>

<audio id="voice" src="https://drive.google.com/file/d/1j5dhUBFwUTyNMq6jDscWR0lKiHwnOyIO/view?usp=drive_link"></audio>
<audio id="music" src="https://drive.google.com/file/d/1yz2gv_cva1LBAv95u_qI8l5rPhgc0DPi/view?usp=drive_link" loop></audio>

<script>
const slides = [
{
text: "Dal momento in cui sei entrato nella mia vita, hai dato un senso a tutto e i miei occhi si sono aperti per la prima volta come quelli di un neonato.",
img: "https://i.imgur.com/aIQX3qv.jpeg"
},
{
text: "Il tuo sorriso mi ha fatto sentire al sicuro e ho capito con certezza che tu mi completi.",
img: "https://i.imgur.com/8g2U889.jpeg"
},
{
text: "Sono così orgogliosa di te e della donna che sei diventata.",
img: "https://i.imgur.com/6gzdS17.jpeg"
},
{
text: "Mi dispiace se ho fatto qualcosa di sbagliato o se ti ho reso infelice o triste, è l'ultima cosa che vorrei.",
img: "https://i.imgur.com/nLjdTQ8.jpeg"
},
{
text: "Ti amo infinitamente e vorrei che tu potessi fidarti di me e avere fede in me, farò del mio meglio per far sì che stiamo insieme, Happy Birthday Marwa ❤️",
img: "blob:https://imgur.com/0c4796f8-9776-4fba-9ceb-66551432595f"
}
];

let index = 0;
let i = 0;

// typing
function typeWriter(text) {
  if (i < text.length) {
    document.getElementById("box").innerHTML += text.charAt(i);
    i++;
    setTimeout(() => typeWriter(text), 35);
  }
}

// next
function nextText() {
  if (index < slides.length) {
    document.getElementById("box").innerHTML = "";
    i = 0;

    typeWriter(slides[index].text);

    const img = document.getElementById("image");
    img.src = slides[index].img;
    img.style.display = "block";

    index++;

    if (index === 1) {
      document.getElementById("music").play();
      document.getElementById("voice").play();
    }

  } else {
    document.getElementById("nextBtn").innerHTML = "❤️ The End ❤️";
  }
}

// hearts
setInterval(() => {
  const heart = document.createElement("div");
  heart.className = "heart";
  heart.innerHTML = "❤️";
  heart.style.left = Math.random()*100 + "vw";
  heart.style.fontSize = (Math.random()*20+10)+"px";
  document.body.appendChild(heart);

  setTimeout(()=>heart.remove(),5000);
},300);
</script>

</body>
</html>
