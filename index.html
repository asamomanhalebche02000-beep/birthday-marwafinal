<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Marwa ❤️</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  text-align: center;
  background: linear-gradient(to bottom, #ff9a9e, #fad0c4);
  color: white;
  overflow-x: hidden;
}

h1 { margin-top: 20px; }

/* cake */
.cake {
  font-size: 80px;
  animation: bounce 1s infinite alternate;
}

@keyframes bounce {
  from { transform: translateY(0); }
  to { transform: translateY(-12px); }
}

/* candles */
.candles {
  font-size: 18px;
  margin-top: -15px;
  letter-spacing: 3px;
}

/* centered container */
.container {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  margin: 20px auto;
  max-width: 420px;
  padding: 0 15px;
}

/* text box */
#box {
  font-size: 20px;
  min-height: 120px;
  width: 100%;
  text-align: center;
}

/* image always centered under text */
img {
  width: 250px;
  border-radius: 15px;
  margin-top: 15px;
  display: block;
}

/* button */
button {
  padding: 10px 20px;
  font-size: 18px;
  border: none;
  border-radius: 20px;
  background: white;
  color: #ff4d6d;
  cursor: pointer;
  margin-top: 20px;
}

/* hearts */
.heart {
  position: absolute;
  color: red;
  animation: float 5s linear infinite;
}

@keyframes float {
  from { transform: translateY(100vh); opacity: 1; }
  to { transform: translateY(-10vh); opacity: 0; }
}
</style>
</head>

<body>

<h1>Happy Birthday Marwa ❤️</h1>

<div class="cake">🎂</div>

<div id="candles" class="candles">
🕯️🕯️🕯️🕯️🕯️ 🕯️🕯️🕯️🕯️🕯️ 🕯️🕯️🕯️🕯️🕯️ 🕯️🕯️🕯️🕯️🕯️ 🕯️
</div>

<!-- everything stacked vertically & centered -->
<div class="container">
  <div id="box"></div>
  <img id="image" style="display:none;">
  <button id="nextBtn" onclick="nextText()">Start ❤️</button>
</div>

<audio id="voice" src="./voice.mp3"></audio>
<audio id="music" src="./music.mp3" loop></audio>

<script>
const slides = [
{
text: "Dal momento in cui sei entrato nella mia vita, hai dato un senso a tutto e i miei occhi si sono aperti per la prima volta come quelli di un neonato.",
img: "https://i.imgur.com/aIQX3qv.jpeg"
},
{
text: "Il tuo sorriso mi ha fatto sentire al sicuro e ho capito con certezza che tu mi completi.",
img: "https://i.imgur.com/8g2U889.jpeg"
},
{
text: "Sono così orgogliosa di te e della donna che sei diventata.",
img: "https://i.imgur.com/6gzdS17.jpeg"
},
{
text: "Mi dispiace se ho fatto qualcosa di sbagliato o se ti ho reso infelice o triste, è l'ultima cosa che vorrei.",
img: "https://i.imgur.com/nLjdTQ8.jpeg"
},
{
text: "Ti amo infinitamente e vorrei che tu potessi fidarti di me e avere fede in me, farò del mio meglio per far sì che stiamo insieme, Happy Birthday Marwa ❤️",
img: "https://i.imgur.com/mls0sik.jpeg"
}
];

let index = 0;
let i = 0;

// typing effect
function typeWriter(text) {
  if (i < text.length) {
    document.getElementById("box").innerHTML += text.charAt(i);
    i++;
    setTimeout(() => typeWriter(text), 35);
  }
}

// next slide
function nextText() {
  if (index < slides.length) {
    document.getElementById("box").innerHTML = "";
    i = 0;

    typeWriter(slides[index].text);

    const img = document.getElementById("image");
    img.src = slides[index].img;
    img.style.display = "block";

    index++;

    // volume control + play audio on first click
    if (index === 1) {
      const voice = document.getElementById("voice");
      const music = document.getElementById("music");

      voice.volume = 1.0;
      music.volume = 0.3;

      voice.play().catch(e => console.log(e));
      music.play().catch(e => console.log(e));
    }

    // ✅ After first click, button says "Next"
    document.getElementById("nextBtn").innerHTML = "Next ❤️";

  } else {
    // ✅ After last slide, button says "The End"
    document.getElementById("nextBtn").innerHTML = "❤️ The End ❤️";
  }
}

// floating hearts
setInterval(() => {
  const heart = document.createElement("div");
  heart.className = "heart";
  heart.innerHTML = "❤️";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = (Math.random() * 20 + 10) + "px";
  document.body.appendChild(heart);
  setTimeout(() => heart.remove(), 5000);
}, 300);
</script>

</body>
</html>
